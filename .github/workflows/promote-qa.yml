name: Promote to QA

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Promote and Deploy to QA Org
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: qa

      - name: Merge dev into qa
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git merge origin/dev --ff-only
          git push origin qa

      - name: Salesforce Setup
        uses: ./.github/actions/sf-setup
        with:
          auth-url: ${{ secrets.SF_AUTH_URL }}

      - name: Delta Deploy to QA
        uses: ./.github/actions/sf-delta-deploy
        with:
          environment: qa
          test-class: AccountServiceTest

      - name: Tag successful deployment
        run: |
          git tag -f deployed/qa
          git push origin refs/tags/deployed/qa --force

      - name: Notify Teams — QA ready for testing
        if: always()
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$TEAMS_WEBHOOK_URL" ] && echo "TEAMS_WEBHOOK_URL not configured — skipping notification." && exit 0
          COLOR=$([ "$STATUS" = "success" ] && echo "00B050" || echo "FF0000")
          TITLE=$([ "$STATUS" = "success" ] && echo "QA Deployment Succeeded — Ready for Testing" || echo "QA Deployment Failed")
          curl -s -H "Content-Type: application/json" -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"http://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"$TITLE\",
            \"sections\": [{
              \"activityTitle\": \"$TITLE\",
              \"facts\": [
                {\"name\": \"Triggered by\", \"value\": \"$ACTOR\"},
                {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"},
                {\"name\": \"Pipeline Run\", \"value\": \"$RUN_URL\"}
              ]
            }]
          }" "$TEAMS_WEBHOOK_URL"
