name: Promote to QA

on:
  workflow_dispatch:

jobs:
  promote:
    name: Merge dev into QA
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge dev into qa
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout qa
          git merge origin/dev --ff-only
          git push origin qa
