name: PR Validation

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

jobs:
  scans:
    name: Security Scans
    uses: ./.github/workflows/shared-scans.yml

  apex-validation:
    name: Apex Check-Only Validation
    runs-on: ubuntu-latest
    needs: [scans]
    steps:
      - uses: actions/checkout@v4

      - name: Salesforce Setup
        uses: ./.github/actions/sf-setup
        with:
          auth-url: ${{ secrets.SF_AUTH_URL }}

      - name: Validate deployment (check-only, no actual deploy)
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org target-org \
            --test-level RunSpecifiedTests \
            --tests AccountServiceTest
