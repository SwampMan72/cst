name: PR Validation

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

jobs:
  static-analysis:
    name: PMD Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PMD
        uses: pmd/pmd-github-action@v2
        id: pmd
        with:
          version: "latest"
          sourcePath: "force-app"
          rulesets: "PMDruleSet.xml"
          analyzeModifiedFilesOnly: false

      - name: Fail if PMD violations found
        if: steps.pmd.outputs.violations != '0'
        run: exit 1

  unit-tests:
    name: LWC Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm run test:unit

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (fail on high or critical)
        run: npm audit --audit-level=high

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "table"
          ignore-unfixed: true

  apex-validation:
    name: Apex Check-Only Validation
    runs-on: ubuntu-latest
    needs: [static-analysis, unit-tests, dependency-scan, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Install SF CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate to Dev Org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > auth.url
          sf org login sfdx-url --sfdx-url-file auth.url --alias target-org --set-default
          rm -f auth.url

      - name: Validate deployment (check-only, no actual deploy)
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org target-org \
            --test-level RunSpecifiedTests \
            --tests AccountServiceTest
