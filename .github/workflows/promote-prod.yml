name: Promote to Production

# Standard flow:     leave release-branch empty — promotes from UAT
# Release branch:    enter release/sprint-15 — promotes that specific branch to prod
#                    (release branch must contain only features approved for this release)

on:
  workflow_dispatch:
    inputs:
      release-branch:
        description: "Release branch to promote (e.g. release/sprint-15). Leave empty to promote from UAT."
        required: false
        type: string
        default: ""

jobs:
  scans:
    name: Security Scans
    uses: ./.github/workflows/shared-scans.yml
    with:
      ref: ${{ inputs.release-branch != '' && inputs.release-branch || 'uat' }}

  deploy:
    name: Promote and Deploy to Production Org
    runs-on: ubuntu-latest
    environment: prod
    needs: [scans]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Merge source into main
        run: |
          SOURCE="${{ inputs.release-branch != '' && inputs.release-branch || 'uat' }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git merge "origin/$SOURCE" --ff-only
          git push origin main

      - name: Salesforce Setup
        uses: ./.github/actions/sf-setup
        with:
          auth-url: ${{ secrets.SF_AUTH_URL }}

      - name: Delta Deploy to Production
        uses: ./.github/actions/sf-delta-deploy
        with:
          environment: prod
          test-class: AccountServiceTest

      - name: Create GitHub Release and tag deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_DATE=$(date +'%Y.%m.%d')
          RELEASE_TAG="release/${RELEASE_DATE}-${SHORT_SHA}"
          SOURCE="${{ inputs.release-branch != '' && inputs.release-branch || 'uat' }}"

          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

          git tag -f deployed/prod
          git push origin refs/tags/deployed/prod --force

          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" << EOF
          ## Production Deployment

          **Date:** $(date +'%Y-%m-%d %H:%M UTC')
          **Triggered by:** ${{ github.actor }}
          **Source:** ${SOURCE}
          **Commit:** $(git rev-parse HEAD)

          Promoted via automated pipeline. All security scans passed. Production approval granted by ${{ github.actor }}.
          EOF

          gh release create "$RELEASE_TAG" \
            --title "Production Release ${RELEASE_DATE}" \
            --notes-file "$NOTES_FILE" \
            --latest

      - name: Notify Teams — Production deployment
        if: always()
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$TEAMS_WEBHOOK_URL" ] && echo "TEAMS_WEBHOOK_URL not configured — skipping notification." && exit 0
          COLOR=$([ "$STATUS" = "success" ] && echo "7030A0" || echo "FF0000")
          TITLE=$([ "$STATUS" = "success" ] && echo "Production Deployment Succeeded" || echo "Production Deployment FAILED")
          SOURCE="${{ inputs.release-branch != '' && inputs.release-branch || 'uat' }}"
          curl -s -H "Content-Type: application/json" -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"http://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"$TITLE\",
            \"sections\": [{
              \"activityTitle\": \"$TITLE\",
              \"facts\": [
                {\"name\": \"Triggered by\", \"value\": \"$ACTOR\"},
                {\"name\": \"Source\", \"value\": \"$SOURCE\"},
                {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"},
                {\"name\": \"Pipeline Run\", \"value\": \"$RUN_URL\"}
              ]
            }]
          }" "$TEAMS_WEBHOOK_URL"
