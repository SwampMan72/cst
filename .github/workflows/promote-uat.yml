name: Promote to UAT

on:
  workflow_dispatch:

jobs:
  promote:
    name: Merge qa into UAT
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge qa into uat
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout uat
          git merge origin/qa --ff-only
          git push origin uat
