name: Promote to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: Deploy to Dev Org
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Salesforce Setup
        uses: ./.github/actions/sf-setup
        with:
          auth-url: ${{ secrets.SF_AUTH_URL }}

      - name: Delta Deploy to Dev
        uses: ./.github/actions/sf-delta-deploy
        with:
          environment: dev
          test-class: AccountServiceTest

      - name: Tag successful deployment
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f deployed/dev
          git push origin refs/tags/deployed/dev --force
